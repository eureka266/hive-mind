<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <style>
      body, table, td, p, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
      table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
      @media screen and (max-width: 640px) {
        .email-container { width:100% !important; max-width:100% !important; }
      }
    </style>
    <title>Product update</title>
  </head>
  <body style="margin:0; padding:0; background:#f5f6f8;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f6f8;">
      <tr>
        <td align="center" style="padding:24px 16px;">
          <table class="email-container" role="presentation" align="center" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px; width:100%; background:#ffffff; border-radius:12px; border:1px solid #e6e8eb;">
            <tr>
              <td style="padding:32px 32px 8px 32px;">
                <!-- Body content is injected here by render_email.py -->
                <div class="email-body" style="color:#1a1a1a; font-family:Arial,Helvetica,sans-serif; font-size:15px; line-height:1.8;">
                  <p style="margin:0 0 0.9em 0;">Hi {Name},</p>
                  <p style="margin:0 0 0.9em 0;">[Your marketing message goes here.]</p>
                </div>
              </td>
            </tr>
            <!-- SIGNATURE_START -->
            <tr>
              <td style="padding:8px 32px 32px 32px;">
                <div style="border-top:1px solid #e6e8eb; padding-top:16px; color:#6b7280; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.6;">
                  <p style="margin:0;">— The Product Team</p>
                  <p style="margin:4px 0 0 0;"><a href="https://example.com" style="color:#2563eb; text-decoration:none;">your-product.com</a></p>
                </div>
              </td>
            </tr>
            <!-- SIGNATURE_END -->
          </table>
          <table role="presentation" width="640" style="max-width:640px; width:100%;">
            <tr>
              <td style="padding:16px 32px; color:#9ca3af; font-family:Arial,Helvetica,sans-serif; font-size:12px; line-height:1.6;">
                You received this email because you signed up for [Your Product].
                <a href="https://example.com/unsubscribe" style="color:#9ca3af;">Unsubscribe</a>.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
