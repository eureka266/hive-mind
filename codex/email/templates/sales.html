<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <style>
      body, table, td, p, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
      table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
      @media screen and (max-width: 640px) {
        .email-container { width:100% !important; max-width:100% !important; }
      }
    </style>
    <title>Hello from [Your Product]</title>
  </head>
  <body style="margin:0; padding:0; background:#ffffff;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;">
      <tr>
        <td align="center" style="padding:24px 16px;">
          <table class="email-container" role="presentation" align="center" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px; width:100%;">
            <tr>
              <td style="padding:8px 8px 0 8px;">
                <!-- Body content is injected here by render_email.py -->
                <div class="email-body" style="color:#111827; font-family:Arial,Helvetica,sans-serif; font-size:15px; line-height:1.8;">
                  <p style="margin:0 0 0.9em 0;">Hi {Name},</p>
                  <p style="margin:0 0 0.9em 0;">[Your sales outreach message goes here.]</p>
                </div>
              </td>
            </tr>
            <!-- SIGNATURE_START -->
            <tr>
              <td style="padding:16px 8px 24px 8px;">
                <div style="color:#374151; font-family:Arial,Helvetica,sans-serif; font-size:14px; line-height:1.6;">
                  <p style="margin:0;">Best,</p>
                  <p style="margin:4px 0 0 0;"><strong>[Your Name]</strong><br/>[Your Product] · <a href="https://example.com" style="color:#2563eb; text-decoration:none;">example.com</a></p>
                </div>
              </td>
            </tr>
            <!-- SIGNATURE_END -->
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
